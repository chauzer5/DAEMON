<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daemon</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved UI scale before React renders to avoid flash
      try {
        var s = localStorage.getItem("daemon_ui_scale");
        if (s) document.documentElement.style.setProperty("--ui-scale", s);
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
